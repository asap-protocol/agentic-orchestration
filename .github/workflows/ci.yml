name: CI

on:
  push:
    branches: [main, feat/asap-integration]
  pull_request:
    branches: [main, feat/asap-integration]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm@11 (packageManager) requires Node >= 22.13
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm run test:run

      - name: Build
        run: pnpm run build
        env:
          AUTH_SECRET: "ci-build-placeholder-min-32-chars-long"
          AUTH_GITHUB_ID: ""
          AUTH_GITHUB_SECRET: ""
          AUTH_URL: "http://localhost:3000"
